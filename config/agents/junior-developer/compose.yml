# Junior Developer Agent
# Just drop this folder into config/agents/ and run `make docker-up`

services:
  picoclaw-junior-developer:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles:
      - gateway
    command: ["gateway"]
    container_name: picoclaw-junior-developer
    environment:
      - PICOCLAW_DISCORD_LISTEN_ALL=true
      - PICOCLAW_TASKQUEUE_ENABLED=true
      - PICOCLAW_TASKQUEUE_INTERVAL_MINUTES=5
    volumes:
      - ./config/agents/junior-developer/config.json:/home/picoclaw/.picoclaw/config.json:ro
      - ./workspace/junior-developer:/home/picoclaw/.picoclaw/workspace
      - ./workspace/skills:/home/picoclaw/.picoclaw/workspace/skills:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18800:18790"
